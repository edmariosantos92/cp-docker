<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB 1 - Docker Checkpoint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        
        .image-container {
            margin: 30px 0;
        }
        
        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .info {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin: 30px 0;
            border-radius: 5px;
            text-align: left;
        }
        
        .info p {
            color: #555;
            line-height: 1.8;
            margin: 10px 0;
        }
        
        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            margin: 10px 5px;
            font-size: 0.9em;
        }
        
        footer {
            margin-top: 30px;
            color: #999;
            font-size: 0.9em;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐳 LAB 1 Docker</h1>
        <p class="subtitle">Página Web Estática em Container</p>
        
        <div class="image-container">
            <img src="https://www.docker.com/wp-content/uploads/2023/08/logo-guide-blue.png" alt="Docker Logo">
        </div>
        
        <div class="info">
            <p><strong>✓ Status:</strong> Aplicação rodando com sucesso!</p>
            <p><strong>📦 Tecnologia:</strong> Docker + NGINX</p>
            <p><strong>🎯 Objetivo:</strong> Executar página web estática em container Docker usando bind mount</p>
        </div>
        
        <div>
            <span class="badge">Docker</span>
            <span class="badge">NGINX</span>
            <span class="badge">HTML5</span>
            <span class="badge">CSS3</span>
        </div>
        
        <footer>
            <p>Checkpoint 1 - Computação em Nuvem | FIAP 2026</p>
        </footer>
    </div>
</body>
</html>
